<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>KH90 Subway Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial'; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: white; z-index: 10; pointer-events: none; }
        .box { background: rgba(0,0,0,0.7); padding: 10px 20px; border: 2px solid #ffcc00; border-radius: 10px; font-size: 22px; font-weight: bold; }
        #win-screen { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 40px; border: 5px solid #00ff00; 
            text-align: center; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="win-screen">
    <h1>MISSION ACCOMPLISHED!</h1>
    <p>ਤੁਸੀਂ 50 ਸਿੱਕੇ ਇਕੱਠੇ ਕਰ ਲਏ ਹਨ!</p>
    <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer; background:#00ff00; border:none; font-weight:bold;">ਦੁਬਾਰਾ ਖੇਡੋ</button>
</div>

<div id="ui">
    <div class="box">COINS: <span id="score">0</span> / 50</div>
    <div class="box">LIVES: <span id="lives">3</span></div>
</div>

<script>
    let scene, camera, renderer, player;
    let coins = [], obstacles = [];
    let score = 0, lives = 3, lane = 0, gameActive = true;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 10, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // Track
        const trackGeo = new THREE.PlaneGeometry(10, 2000);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        scene.add(track);

        // Player (Runner)
        player = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.8), new THREE.MeshPhongMaterial({ color: 0x00ff00 }));
        player.position.y = 0.75;
        scene.add(player);

        camera.position.set(0, 5, 8);

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') if(lane > -1) lane--;
            if(e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') if(lane < 1) lane++;
        });

        animate();
    }

    function spawnItems() {
        if (Math.random() < 0.05 && gameActive) {
            // Spawn Coin
            const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.1, 16), new THREE.MeshPhongMaterial({ color: 0xffd700 }));
            coin.rotation.x = Math.PI / 2;
            coin.position.set((Math.floor(Math.random() * 3) - 1) * 3, 0.5, player.position.z - 40);
            scene.add(coin);
            coins.push(coin);
        }
        if (Math.random() < 0.02 && gameActive) {
            // Spawn Obstacle
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.5), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            obs.position.set((Math.floor(Math.random() * 3) - 1) * 3, 0.5, player.position.z - 50);
            scene.add(obs);
            obstacles.push(obs);
        }
    }

    function animate() {
        if (!gameActive) return;
        requestAnimationFrame(animate);

        player.position.z -= 0.2; // Auto Forward
        player.position.x = THREE.MathUtils.lerp(player.position.x, lane * 3, 0.1);
        camera.position.z = player.position.z + 8;
        camera.lookAt(player.position);

        spawnItems();

        // Coins Collection
        coins.forEach((c, i) => {
            c.rotation.y += 0.05;
            if (player.position.distanceTo(c.position) < 1.2) {
                scene.remove(c);
                coins.splice(i, 1);
                score++;
                document.getElementById('score').innerText = score;
                if (score >= 50) {
                    gameActive = false;
                    document.getElementById('win-screen').style.display = 'block';
                }
            }
        });

        // Obstacle Collision
        obstacles.forEach((o, i) => {
            if (player.position.distanceTo(o.position) < 1.5) {
                scene.remove(o);
                obstacles.splice(i, 1);
                lives--;
                document.getElementById('lives').innerText = lives;
                if (lives <= 0) {
                    gameActive = false;
                    alert("GAME OVER! You ran out of lives.");
                    location.reload();
                }
            }
        });

        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
