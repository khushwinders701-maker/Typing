<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>KH90 Tank War Mission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: Arial; }
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: #f00; z-index: 10; pointer-events: none; }
        .box { background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border: 2px solid #f00; border-radius: 5px; font-weight: bold; }
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 18px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="box">TANKS DESTROYED: <span id="score">0</span> / 10</div>
    <div class="box">BASE HEALTH: <span id="hp">100</span>%</div>
</div>
<div id="msg">WASD to Move | SPACE to Fire</div>

<div id="container"></div>

<script>
    let scene, camera, renderer, tank;
    let bullets = [], enemies = [];
    let score = 0, hp = 100, gameActive = true;
    let keys = { w: false, s: false, a: false, d: false };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x404040));
        let light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // Ground
        let ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Player Tank
        tank = new THREE.Group();
        let body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshPhongMaterial({color: 0x005500}));
        let turret = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1), new THREE.MeshPhongMaterial({color: 0x008800}));
        turret.position.y = 0.75;
        let barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2), new THREE.MeshPhongMaterial({color: 0x003300}));
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.75, -1.5);
        tank.add(body, turret, barrel);
        tank.position.y = 0.5;
        scene.add(tank);

        camera.position.set(0, 10, 15);
        camera.lookAt(tank.position);

        window.onkeydown = (e) => { 
            keys[e.key.toLowerCase()] = true;
            if(e.key === ' ' && gameActive) shoot();
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        animate();
    }

    function shoot() {
        let b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
        b.position.copy(tank.position);
        b.position.y = 1.2;
        b.userData = { dir: new THREE.Vector3(0, 0, -1).applyQuaternion(tank.quaternion) };
        scene.add(b);
        bullets.push(b);
    }

    function spawnEnemy() {
        if(Math.random() < 0.015 && enemies.length < 5) {
            let enemy = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2), new THREE.MeshPhongMaterial({color: 0x880000}));
            enemy.position.set((Math.random()-0.5)*40, 0.75, -40);
            scene.add(enemy);
            enemies.push(enemy);
        }
    }

    function animate() {
        if(!gameActive) return;
        requestAnimationFrame(animate);

        if(keys.w) tank.translateZ(-0.1);
        if(keys.s) tank.translateZ(0.1);
        if(keys.a) tank.rotation.y += 0.05;
        if(keys.d) tank.rotation.y -= 0.05;

        camera.position.x = tank.position.x;
        camera.position.z = tank.position.z + 15;
        camera.lookAt(tank.position);

        spawnEnemy();

        // Bullets
        bullets.forEach((b, bi) => {
            b.position.addScaledVector(b.userData.dir, 0.5);
            if(b.position.length() > 100) { scene.remove(b); bullets.splice(bi, 1); }
            
            enemies.forEach((e, ei) => {
                if(b.position.distanceTo(e.position) < 2) {
                    scene.remove(e); enemies.splice(ei, 1);
                    scene.remove(b); bullets.splice(bi, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                    if(score >= 10) { alert("MISSION ACCOMPLISHED: Commander KH90!"); location.reload(); }
                }
            });
        });

        // Enemies move to base
        enemies.forEach((e, ei) => {
            e.position.z += 0.05;
            if(e.position.z > 10) {
                scene.remove(e); enemies.splice(ei, 1);
                hp -= 20;
                document.getElementById('hp').innerText = hp;
                if(hp <= 0) { alert("BASE DESTROYED! Mission Failed."); location.reload(); }
            }
        });

        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
